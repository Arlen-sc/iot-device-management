<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT设备管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="layout">
        <nav id="sidebar">
            <div class="logo">
                <h2>IoT管理系统</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="#/tasks" data-page="tasks">任务管理</a></li>
                <li><a href="#/devices" data-page="devices">设备台账</a></li>
                <li><a href="#/categories" data-page="categories">设备分类</a></li>
                <li><a href="#/models" data-page="models">设备型号</a></li>
                <li><a href="#/operations" data-page="operations">操作类型</a></li>
                <li><a href="#/alerts" data-page="alerts">告警管理</a></li>
                <li><a href="#/data-bridges" data-page="data-bridges">数据桥接</a></li>
            </ul>
        </nav>
        <main id="content">
            <div id="app"></div>
        </main>
    </div>
    <!-- Flow Designer overlay (hidden by default) -->
    <div id="designer-overlay" class="designer-overlay hidden">
        <div class="designer-toolbar">
            <button id="designer-back" class="btn btn-secondary">&larr; 返回任务列表</button>
            <span id="designer-title" class="designer-title">流程设计器</span>
            <div class="toolbar-actions">
                <button id="designer-validate" class="btn btn-warning">校验</button>
                <button id="designer-save" class="btn btn-primary">保存</button>
                <button id="designer-execute" class="btn btn-success">执行</button>
            </div>
        </div>
        <div class="designer-body">
            <div id="node-panel" class="node-panel">
                <!-- Node types will be rendered by JS -->
            </div>
            <div id="canvas-container" class="canvas-container">
                <!-- X6 graph will mount here -->
            </div>
            <div id="config-panel" class="config-panel">
                <div id="config-content">
                    <p class="config-hint">点击节点查看配置</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button id="modal-cancel" class="btn btn-secondary">取消</button>
                <button id="modal-confirm" class="btn btn-primary">确认</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/lib/x6.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/pages/task-list.js"></script>
    <script src="/js/pages/device-list.js"></script>
    <script src="/js/pages/category-list.js"></script>
    <script src="/js/pages/model-list.js"></script>
    <script src="/js/pages/operation-list.js"></script>
    <script src="/js/pages/alert-list.js"></script>
    <script src="/js/pages/data-bridge-list.js"></script>
    <script src="/js/designer/designer.js"></script>
</body>
</html>
