<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT设备管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .header-bar h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <h1>🔐 IoT设备管理系统</h1>
        <div class="header-actions">
            <div class="user-info">
                <span>👤 管理员</span>
                <button class="logout-btn" onclick="logout()">登出</button>
            </div>
        </div>
    </div>
    <div id="layout">
        <nav id="sidebar">
            <div class="logo">
                <h2>IoT管理系统</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="#/tasks" data-page="tasks">任务管理</a></li>
                <li><a href="#/devices" data-page="devices">设备台账</a></li>
                <li><a href="#/categories" data-page="categories">设备分类</a></li>
                <li><a href="#/models" data-page="models">设备型号</a></li>
                <li><a href="#/operations" data-page="operations">操作类型</a></li>
                <li><a href="#/alerts" data-page="alerts">告警管理</a></li>
                <li><a href="#/data-bridges" data-page="data-bridges">数据桥接</a></li>
                <li><a href="#/data-sources" data-page="data-sources">数据源管理</a></li>
            </ul>
        </nav>
        <main id="content">
            <div id="app"></div>
        </main>
    </div>
    <!-- Flow Designer overlay (hidden by default) -->
    <div id="designer-overlay" class="designer-overlay hidden">
        <div class="designer-toolbar">
            <button id="designer-back" class="btn btn-secondary">&larr; 返回任务列表</button>
            <span id="designer-title" class="designer-title">流程设计器</span>
            <div class="toolbar-actions" style="display:flex;gap:8px;align-items:center;">
                <div class="toolbar-center-actions" style="display:flex;gap:4px;margin-right:16px;border-right:1px solid #ddd;padding-right:16px;">
                    <button id="designer-zoom-out" class="btn btn-secondary" title="缩小" style="padding:4px 8px;">-</button>
                    <button id="designer-zoom-in" class="btn btn-secondary" title="放大" style="padding:4px 8px;">+</button>
                    <button id="designer-center" class="btn btn-secondary" title="居中内容" style="padding:4px 8px;">⌖</button>
                </div>
                <button id="designer-validate" class="btn btn-warning">校验</button>
                <button id="designer-save" class="btn btn-primary">保存</button>
                <button id="designer-execute" class="btn btn-success">调试</button>
            </div>
        </div>
        <div class="designer-body">
            <div id="node-panel" class="node-panel">
                <!-- Node types will be rendered by JS -->
            </div>
            <div id="canvas-container" class="canvas-container">
                <!-- X6 graph will mount here -->
            </div>
            <div id="config-panel" class="config-panel">
                <div id="config-content">
                    <p class="config-hint">点击节点查看配置</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button id="modal-cancel" class="btn btn-secondary">取消</button>
                <button id="modal-confirm" class="btn btn-primary">确认</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script>
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = '/logout';
            }
        }
    </script>

    <script src="/lib/x6.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/debug-console.js"></script>
    <script src="/js/pages/task-list.js"></script>
    <script src="/js/pages/device-list.js"></script>
    <script src="/js/pages/category-list.js"></script>
    <script src="/js/pages/model-list.js"></script>
    <script src="/js/pages/operation-list.js"></script>
    <script src="/js/pages/alert-list.js"></script>
    <script src="/js/pages/data-bridge-list.js"></script>
    <script src="/js/pages/data-source-list.js"></script>
    <script src="/js/designer/designer.js"></script>
</body>
</html>
